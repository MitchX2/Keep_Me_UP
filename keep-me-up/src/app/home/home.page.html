<ion-header>
  <ion-toolbar class="page-toolbar">
    <div class="page-top-bar">
      <div class="page-top-side left-side"></div>

      <button class="banner-button" type="button" (click)="goHome()">
        <img
          src="assets/banner/keep-me-up_banner.png"
          alt="Keep Me Up banner"
          class="banner-image"
        />
      </button>

      <div class="page-top-side right-side">
        <ion-button
          fill="clear"
          class="header-button"
          [routerLink]="['/settings']"
        >
          Settings
        </ion-button>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">
  <div class="home-page ion-padding">

    <ion-card class="league-table-card" *ngIf="selectedLeague">
      <ion-card-header>
        <div class="league-card-header">
          <ion-card-title>{{ selectedLeague.name }}</ion-card-title>
          <ion-button
            size="small"
            fill="outline"
            [routerLink]="['/league-table', selectedLeague.id]"
          >
            Full Table
          </ion-button>
        </div>
      </ion-card-header>

      <ion-card-content>
        <ion-segment
          class="league-segment"
          [value]="selectedLeague.id"
          (ionChange)="onLeagueChange($event)"
          scrollable="true"
        >
          <ion-segment-button
            *ngFor="let league of leagues"
            [value]="league.id"
          >
            <ion-label>{{ league.name }}</ion-label>
          </ion-segment-button>
        </ion-segment>

        <div class="loading-wrap" *ngIf="loading">
          <ion-spinner></ion-spinner>
        </div>

        <div class="table-wrap" *ngIf="!loading">
          <div class="table-header-row">
            <span class="col-pos">Pos</span>
            <span class="col-team">Team</span>
            <span class="col-points">Pts</span>
          </div>

          <div class="table-scroll">
            <button
              class="table-row"
              type="button"
              *ngFor="let team of standings"
              (click)="selectTeam(team.idTeam)"
              [class.selected-team]="selectedTeamId === team.idTeam"
            >
              <span class="col-pos">{{ team.intRank }}</span>

              <span class="col-team">
                <img
                  *ngIf="team.strBadge"
                  [src]="team.strBadge"
                  [alt]="team.strTeam + ' badge'"
                  class="team-badge"
                />
                <span class="team-name">{{ team.strTeam }}</span>
              </span>

              <span class="col-points">{{ team.intPoints }}</span>
            </button>
          </div>
        </div>

        <div class="table-actions" *ngIf="!loading && selectedTeamId">
          <ion-button
            expand="block"
            color="secondary"
            [routerLink]="['/team', selectedTeamId]"
          >
            View Team
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

    <ion-card class="matches-card" *ngIf="selectedLeague">
  <ion-card-header>
    <ion-card-title>Upcoming Matches</ion-card-title>
  </ion-card-header>

    <ion-card-content>
      <div class="matches-scroll" *ngIf="matches?.length; else noMatches">
        <button
          class="match-card"
          type="button"
          *ngFor="let match of matches"
          (click)="openMatchday(match)"
        >
          <div class="match-teams">
            <div class="match-side home-side">
              <img
                *ngIf="getTeamBadge(match.idHomeTeam)"
                [src]="getTeamBadge(match.idHomeTeam)!"
                [alt]="match.strHomeTeam + ' badge'"
                class="match-badge"
              />
              <div class="match-team">{{ match.strHomeTeam }}</div>
            </div>

            <div class="match-vs">vs</div>

            <div class="match-side away-side">
              <img
                *ngIf="getTeamBadge(match.idAwayTeam)"
                [src]="getTeamBadge(match.idAwayTeam)!"
                [alt]="match.strAwayTeam + ' badge'"
                class="match-badge"
              />
              <div class="match-team">{{ match.strAwayTeam }}</div>
            </div>
          </div>

          <div class="match-meta">
            <p><strong>Date:</strong> {{ match.dateEvent || 'TBC' }}</p>
            <p><strong>Kick-Off:</strong> {{ match.strTime || 'TBC' }}</p>
            <p *ngIf="match.strVenue"><strong>Venue:</strong> {{ match.strVenue }}</p>
          </div>
        </button>
      </div>

      <ng-template #noMatches>
        <p class="empty-state">No upcoming fixtures available for this league right now.</p>
      </ng-template>
    </ion-card-content>
  </ion-card>

  </div>
</ion-content>
