<ion-header>
  <ion-toolbar>
    <ion-title>{{ league?.name || 'League Table' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-spinner *ngIf="loading"></ion-spinner>

  <ion-list *ngIf="!loading">
    <ion-item *ngFor="let team of standings">
      <ion-label>
        <h2>{{ team.intRank }}. {{ team.strTeam }}</h2>
        <p>
          P: {{ team.intPlayed }} |
          W: {{ team.intWin }} |
          D: {{ team.intDraw }} |
          L: {{ team.intLoss }} |
          Pts: {{ team.intPoints }}
        </p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
