<ion-header>
  <ion-toolbar>
    <ion-title>{{ league?.name || 'Teams' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-spinner *ngIf="loading"></ion-spinner>

  <ion-list *ngIf="!loading">
    <ion-item *ngFor="let team of teams" [routerLink]="['/team', team.idTeam]">
      <ion-avatar slot="start" *ngIf="team.strTeamBadge">
        <img [src]="team.strTeamBadge" [alt]="team.strTeam" />
      </ion-avatar>

      <ion-label>
        <h2>{{ team.strTeam }}</h2>
        <p>{{ team.strStadium }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
